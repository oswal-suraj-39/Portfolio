                    <div class="pcd2">

                        </div>

                        <div>
                            <img class="mailsvg">
                            <p class="pcdpa"></p>
                        </div>

                        <div>
                            <img class="calesvg">
                            <p class="pcdpa"></p>
                        </div>
                    </div>

                    <div class="pcd3">
                        <a class="link" title="Open Linkedin">
                            <img class="logo">
                        </a>

                        <a class="link" title="Open Github">
                            <img class="logo">
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <section id="about" class="aboutSection">
            <h2>About Me</h2>
            <div class="aboutContainer">

                <p class="shortInfo"></p>
                <div class="focusArea">

                        <img>

                    </div>

                    <div>

                    <div>

        <section id="skills" class="skillSection">
            <h2>Skills</h2>
            <div class="skillsContainer">

                <div class="skillBox">
                    <h3></h3>

                <div class="skillBox">
                    <h3></h3>
                    <ul></ul>
                </div>
                <div class="skillBox">
                    <h3></h3>
                    <ul></ul>
                </div>

            </div>
        </section>

        <section id="projects" class="projectsSection">
            <h2>Projects</h2>
            <div class="projectsContainer">

            </div>
        </section>

        <section id="education" class="educationSection">
            <h2>Education</h2>
            <div class="educationContainer">

                <div class="Card">
                    <img>
                    <div class="cardInfo">
                        <p class="eciti"></p>

                </div>
                <div class="Card">

                    <div class="cardInfo">

                </div>

        <section id="contact" class="contactSection">
            <h2>Contact</h2>
            <div class="contactContainer">

                <div class="contactInfo">
                    <h3>Contact information</h3>
                    <div class="Card">
                        <img src="./assets/svgs/mailSign.svg">
                        <div class="cardInfo">
                            <p class="cciti"></p>
                            <p class="ccip"></p>
                        </div>
                    </div>

                    <div class="Card">
                        <img src="./assets/svgs/phoneIcon.svg">
                        <div class="cardInfo">
                            <p class="cciti"></p>
                            <p class="ccip"></p>
                        </div>
                    </div>

                    <div class="Card">
                        <a href="https://www.linkedin.com/in/suraj-oswal-25b458279/" title="Open Linkedin">
                            <img src="./assets/svgs/linkedinLogo.svg">
                        </a>
                        <div class="cardInfo">
                            <p class="cciti"></p>
                            <p class="ccip"></p>
                        </div>
                    </div>

                    <div class="Card">
                        <a href="https://github.com/suraj-oswal-39" title="Open Github">
                            <img src="./assets/svgs/githubLogo.svg">
                        </a>
                        <div class="cardInfo">
                            <p class="cciti"></p>
                            <p class="ccip"></p>
                        </div>
                    </div>

                </div>

                <div class="contactForm">
                    <h3>Contact form</h3>
                    <form id="messageFrom">
                        <b>Name</b>
                        <input type="text" placeholder="Name" id="name" required autocomplete="off">
                        <b>Email</b>
                        <input type="email" placeholder="Email" id="email" required autocomplete="off">
                        <b>Subject</b>
                        <input type="text" placeholder="Subject" id="subject" required autocomplete="off">
                        <b>Message</b>
                        <textarea placeholder="Message" id="message" required autocomplete="off"></textarea>
                        <button id="sendBtn">Submit</button>
                    </form>
                </div>

            </div>
        </section>

    </section>

    <script src="script.js"></script>
</body>

</html>
