<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body id="home">
    <div class="glassfilter"></div>
    <section class="container">

        <div class="navbar">

                <div class="NameTitle">
                    <p class="nt1"></p>
                    <p class="nt2"></p>
                </div>
            </div>

            <div class="tabs">
                <a href="#home" class="tabActive">Home</a>
                <a href="#about">About</a>
                <a href="#skills">Skills</a>
                <a href="#projects">Projects</a>
                <a href="#education">Education</a>
                <a href="#contact">Contact</a>
            </div>
        </div>

        <section class="heroSection">
            <div class="introText">
                <div class="Status">
                    <div class="dot"></div>
                    <p class="myStatus1"></p>
                </div>
                <h1 class="tagLine"></h1>
            </div>

            <div class="profileCard">

                <div class="profileCardDetails">
                    <div class="pcd1">
                        <p class="pcdp1"></p>
                        <p class="pcdp2"></p>
                    </div>

                    <div class="pcd2">
                        <div>
                            <img class="locsvg"> 
                            <p class="pcd21"></p>
                        </div>

                        <div>
                            <img class="mailsvg"> 
                            <p class="pcd22"></p>
                        </div>

                        <div>
                            <img class="calesvg">
                            <p class="pcd23"></p>
                        </div>
                    </div>

                    <div class="pcd3">
                        <a class="linkedinLink">
                            <img class="linkedinLogo">
                        </a>

                        <a class="githubLink">
                            <img class="githubLogo">
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <section id="about" class="aboutSection">
            <h2>About Me</h2>
            <div>
                <p class="shortInfo"></p>
                <div class="focusArea">
                    <div>
                        <img class="codingsvg">
                        <p class="fati1"></p>
                        <p class="fainfo1"></p>
                    </div>
                    <div>
                        <img class="dataFlowsvg">
                        <p class="fati2"></p>
                        <p class="fainfo2"></p>

                    <div>
                        <img class="dbmssvg">
                        <p class="fati3"></p>
                        <p class="fainfo3"></p>
                    </div>
                </div>
            </div>

        <section id="skills" class="skillSection">
            <h2>Skills</h2>
            <div class="skillsContainer">
                <div>
                    <h3>Frontend</h3>
                    <ul>
                        <li>HTML</li>
                        <li>CSS</li>
                        <li>JavaScript</li>
                        <li>AngularJS</li>
                    </ul>
                </div>
                <div>
                    <h3>Backend</h3>
                    <ul>
                        <li>Node.JS</li>
                        <li>Java</li>
                        <li>Python</li>
                        <li>MySQL</li>
                        <li>PostgreSQL</li>
                    </ul>
                </div>
                <div>
                    <h3>Tools</h3>
                    <ul>
                        <li>VS Code</li>
                        <li>Android Studio</li>
                        <li>Eclipse IDE</li>
                        <li>MS Excel</li>
                        <li>MS Word</li>
                        <li>Draw.io</li>
                    </ul>
                </div>
